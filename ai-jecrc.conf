server {
    listen 80;
    server_name ai.jecrcuniversity.edu.in;
    client_max_body_size 500M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ai.jecrcuniversity.edu.in;
    client_max_body_size 500M;

    ssl_certificate     /etc/nginx/ssl/admin-portal.crt;
    ssl_certificate_key /etc/nginx/ssl/admin-portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ==========================
    # 1. JU Bot (Next.js cluster)
    # ==========================
    location /jubot {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================
    # 2. HR portal
    # ==========================
    location /hr {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /hr-api/ {
        rewrite ^/hr-api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================
    # 3. Service Portal
    # ==========================
    location /service {
        rewrite ^/service$ /service/ break;
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /service-api/ {
        rewrite ^/service-api/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================
    # 4. Call Analysis Engine (NEW)
    # ==========================
    location /calling {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================
    # 5. Phaze AI (Sessions)
    # ==========================
    location /sessions {
        rewrite ^/sessions$ /sessions/ break;
        proxy_pass http://127.0.0.1:5060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /sessions-api/ {
        rewrite ^/sessions-api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Security: Hide all env files globally
    location ~ /\.env { deny all; return 404; }

    # ==========================
    # 6. Admin Portal API backend
    # ==========================
    location /api/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================
    # 7. SuperAdmin portal
    # ==========================
    root /var/www/admin-portal;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static files only for admin portal (excludes jubot, hr, service, calling, sessions)
    location ~* ^(?!/jubot|/hr|/service|/calling|/sessions).*\.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
